<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Search</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background:#f8f9fa;
      height:100vh;
      overflow:hidden;
    }
    #top-bar {
      height:60px;
      background:#ffffff;
      border-bottom:1px solid #e0e0e0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 20px;
      position: fixed;
      top:0; left:0; right:0;
      z-index:100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    #logo {
      font-size:1.5rem;
      font-weight:600;
      color:#4255d8;
      margin-right:40px;
    }
    #search-container {
      flex:1;
      max-width:680px;
      display:flex;
      align-items:center;
    }
    #input {
      flex:1;
      height:46px;
      padding:0 20px;
      font-size:1.05rem;
      background:#ffffff;
      border:1px solid #d0d0d0;
      border-radius:999px 0 0 999px;
      outline:none;
    }
    #input:focus {
      border-color:#4255d8;
      box-shadow:0 0 0 3px rgba(66,85,216,0.15);
    }
    #go-btn {
      height:46px;
      width:60px;
      background:#4255d8;
      color:white;
      border:none;
      border-radius:0 999px 999px 0;
      font-size:1.1rem;
      cursor:pointer;
    }
    #engine-select {
      height:46px;
      margin-left:12px;
      padding:0 14px;
      background:#fff;
      border:1px solid #d0d0d0;
      border-radius:8px;
      font-size:1rem;
      color:#333;
    }
    #main {
      height:100%;
      padding-top:60px; /* space for fixed top bar */
      position:relative;
    }
    #status {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%, -50%);
      color:#777;
      font-size:1.1rem;
      text-align:center;
      pointer-events:none;
    }
    iframe {
      width:100%;
      height:100%;
      border:none;
      background:#fff;
      display:none;
    }
  </style>
</head>
<body>

  <div id="top-bar">
    <div id="logo">Search</div>
    <div id="search-container">
      <input id="input" type="text" placeholder="Search or enter URL" autocomplete="off" autofocus>
      <button id="go-btn">Go</button>
      <select id="engine">
        <option value="bing" selected>Bing</option>
        <option value="ddglite">DDG Lite</option>
        <option value="startpage">Startpage</option>
        <option value="google">Google</option>
      </select>
    </div>
  </div>

  <div id="main">
    <div id="status">Enter a URL or search above</div>
    <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation allow-storage-access-by-user-activation"></iframe>
  </div>

  <script>
    const input = document.getElementById('input');
    const goBtn = document.getElementById('go-btn');
    const engine = document.getElementById('engine');
    const frame = document.getElementById('frame');
    const status = document.getElementById('status');

    const engines = {
      bing: 'https://www.bing.com/search?q=',
      ddglite: 'https://html.duckduckgo.com/html/?q=',
      startpage: 'https://www.startpage.com/sp/search?query=',
      google: 'https://www.google.com/search?q='
    };

    let currentEngine = 'bing';

    engine.addEventListener('change', () => currentEngine = engine.value);

    function load(url) {
      status.textContent = 'Loading...';
      frame.src = url;
      frame.style.display = 'block';
      status.style.display = 'none';
      input.blur();
    }

    goBtn.addEventListener('click', () => {
      let v = input.value.trim();
      if (!v) return;

      let url;
      if (!v.includes(' ') && v.includes('.')) {
        url = v.startsWith('http') ? v : 'https://' + v;
      } else {
        url = engines[currentEngine] + encodeURIComponent(v);
      }

      load(url);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') goBtn.click();
    });

    frame.addEventListener('load', () => {
      status.style.display = 'none';
    });
  </script>
</body>
</html>
